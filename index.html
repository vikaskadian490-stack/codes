<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-COMPATIBLE" content="IE-edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <link rel="icon" href="image/gifs.gif">
     <title>
     form using html
     </title>
    </head>
    <body>
        <form action="index.php" method="post" enctype="multipart/form-data">
            <label for="username">username:</label>
            <input type="text" id="username" placeholder="scooba" minlength="5" maxlength="15" required>
            <br>
            <label for="password">password: </label>
            <input type="password" id="password" minlength="10" maxlength="15" required>
            <br>
            <label for="email">email:</label>
            <input type="email" id="email" placeholder="xyz@gmail.com" required>
            <br>
            <label for="phone">mobile no.:</label>
            <input type="tel" id="phone" placeholder="123-456-7890"  pattern="{0-9}{3}-{0-9}{3}-{0-9}{4}" required>
            <br>
            <label for="bday">date of birth:</label>
            <input type="date" id="bday" required>
            <br>
            <label for="quan">quantity:</label>
            <input type="number" id="quan" min="0" max="99" value="1" required>
            <br>
            <label for="title">title:</label>
            <label for="mr">Mr:</label>
            <input type="radio" id="mr" name="title">
            <label for="mis">Mrs:</label>
            <input type="radio" id="mis" name="title">
            <label for="phd">phd:</label>
            <input type="radio" id="phd" name="title">
            <br>
            <label for="pay">payment:</label>
            <select id="pay" required>
                <option value="visa">VISA</option>
                <option value="mastercard">MASTER CARD</option>
                <option value="upi">UPI</option>
            </select>
            <br>
            <label for="u">18 or above 18:</label>
            <input type="checkbox" id="u" required>
            <br>
            <label for="comment">tell ur opinion:</label>
            <textarea  id="comment" rows="4" cols="30"></textarea>
            <br>
            <label for="file">upload File:</label>
            <input type="file" accept="png,image/jpg/jpeg/pdf">
            <input type="reset">
            <input type="submit">

        </form>
    </body>
</html>
